services:
  app:
    build: .
    ports:
      - 8080:8080
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3-distroless
    user: root
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - frontend
      - backend

  grafana:
    image: grafana/grafana:12.1.1
    ports:
      - 3000:3000
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    restart: unless-stopped
    networks:
      - frontend
      - backend

  node-exporter:
    image: prom/node-exporter:v1
    ports:
      - 9100:9100
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns)($|/)'
    restart: unless-stopped
    networks:
      - backend

  pg-zabbix:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_zabbix_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 1m
      timeout: 30s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - backend

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:6.0-ubuntu-latest
    ports:
      - 10051:10051
    depends_on:
      - pg-zabbix
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SERVER_HOST: pg-zabbix
    volumes:
      - zabbix_server_data:/var/lib/zabbix  
    restart: unless-stopped
    networks:
      - backend  

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:6.0-ubuntu-latest
    ports:
      - 8081:8080
    depends_on:
      - zabbix-server
      - pg-zabbix
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SERVER_HOST: pg-zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Europe/Moscow

    restart: unless-stopped
    networks:
      - frontend
      - backend
  
  zabbix-agent:
    image: zabbix/zabbix-agent2:6.0-ubuntu-latest
    privileged: true
    ports:
      - 10050:10050
    depends_on:
      - zabbix-server
    environment:
      ZBX_HOSTNAME: docker-host
      ZBX_SERVER_HOST: zabbix-server
    volumes:
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - backend

volumes:
  prometheus_data: 
  grafana_data:
  postgres_zabbix_data:
  zabbix_server_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge